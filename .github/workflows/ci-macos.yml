# This workflow ONLY calls `just` commands. The justfile is the source of truth.
name: CI - macOS

on:
  push:
    branches: [ main ]

# CI Strategy:
# - Linux: Runs on every PR for fast feedback (see ci-linux.yml)
# - macOS: Runs only on merge to main

jobs:
  ci-macos:
    name: CI - macOS ARM64
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.95.0
        components: rustfmt, clippy

    - name: Verify Rust version
      run: rustc --version && cargo --version && cargo clippy --version

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: macos-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: macos-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Run CI
      run: just ci
