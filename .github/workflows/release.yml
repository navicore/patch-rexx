name: Release to crates.io

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Auto-version and Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}
          ref: main

      # Pinned to match `rust-toolchain.toml` and `.github/workflows/ci-*.yml`.
      # All three values MUST agree — see `setup-rust-ci` invariant.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in Cargo.toml
        run: |
          CURRENT_VERSION=$(awk '
            /^\[package\]/ { in_section=1; next }
            /^\[/ && !/^\[package\]/ { in_section=0 }
            in_section && /^version = / {
              gsub(/^version = "|"$/, "")
              print
              exit
            }
          ' Cargo.toml)

          echo "Current [package].version: $CURRENT_VERSION"
          echo "Tag version:               ${{ steps.version.outputs.version }}"

          if [ "$CURRENT_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            awk -v new_version="${{ steps.version.outputs.version }}" '
              /^\[package\]/ { in_section=1 }
              /^\[/ && !/^\[package\]/ { in_section=0 }
              in_section && /^version = / {
                print "version = \"" new_version "\""
                in_section=0
                next
              }
              { print }
            ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml

            cargo generate-lockfile

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"

            git add Cargo.toml Cargo.lock
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main

            echo "Version updated and pushed"
          else
            echo "Version already matches tag, skipping update"
          fi

      - name: Verify version matches tag
        run: |
          VERSION_IN_TOML=$(awk '
            /^\[package\]/ { in_section=1; next }
            /^\[/ && !/^\[package\]/ { in_section=0 }
            in_section && /^version = / {
              gsub(/^version = "|"$/, "")
              print
              exit
            }
          ' Cargo.toml)

          if [ "$VERSION_IN_TOML" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::[package].version ($VERSION_IN_TOML) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --no-verify --token ${{ secrets.CRATES_IO_TOKEN }} || echo "::warning::publish failed (may already exist on crates.io)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
